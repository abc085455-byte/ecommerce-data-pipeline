version: 2

models:
  - name: int_order_details
    description: "Enriched order data with customer and product details joined"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: net_amount
        tests:
          - not_null